# ============================================================
#  Shelly ESP32 Logger — Manual Firmware Build
#  Triggered manually from the GitHub Actions tab.
#  Produces a .bin ready to flash to the ESP32.
#  Does not perform unit tests...
#
#  How to use:
#    1. Go to your repo on GitHub
#    2. Click Actions → "Build Firmware (manual)"
#    3. Click "Run workflow"
#    4. Select the branch and board variant
#    5. Click the green "Run workflow" button
#    6. Once complete, download the .bin from the Artifacts section
#       of the finished run
#
#  Flashing the downloaded .bin:
#    esptool.py --chip esp32 --port /dev/ttyUSB0 \
#      --baud 460800 write_flash 0x10000 Shelly_ESP32_Logger.bin
# ============================================================
name: Build Firmware (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      board:
        description: "Target board variant"
        required: true
        default: "esp32:esp32:esp32"
        type: choice
        options:
          - esp32:esp32:esp32           # Generic ESP32-WROOM (default)
          - esp32:esp32:esp32wrover     # ESP32-WROVER (with PSRAM)
          - esp32:esp32:nodemcu-32s     # NodeMCU-32S

jobs:
  manual-build:
    name: "Compile (${{ github.event.inputs.board }}  @  ${{ github.event.inputs.branch }})"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=/usr/local/bin sh -s 0.35.3

      - name: Configure arduino-cli for ESP32
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install Arduino libraries
        run: |
          arduino-cli lib install "ArduinoJson"

      # arduino-cli requires sketch folder name == .ino filename
      - name: Prepare sketch folder
        run: cp -r Logger Shelly_ESP32_Logger

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn ${{ github.event.inputs.board }} \
            --output-dir firmware_output \
            Shelly_ESP32_Logger

      # Print binary size so you can see it in the log without downloading
      - name: Show binary size
        run: |
          echo "===== Binary sizes ====="
          ls -lh firmware_output/*.bin
          size firmware_output/*.elf || true

      # Upload with a descriptive name including branch and short commit SHA
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware__${{ github.event.inputs.branch }}__${{ github.sha }}
          path: |
            firmware_output/*.bin
            firmware_output/*.elf
          retention-days: 90    # keep manual builds longer than CI builds
